<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오릭스 전자약정</title>

    <link rel="stylesheet" href="../assets/css/com/default.css" />
    <link rel="stylesheet" href="../assets/css/com/common.css" />
    <link rel="stylesheet" href="../assets/css/com/style.css" />
    <link rel="stylesheet" href="../assets/css/com/fonts.css" />
    <link rel="stylesheet" href="../assets/css/com/layout.css" />
    <link rel="stylesheet" href="../assets/css/com/button.css" />
    <link rel="stylesheet" href="../assets/css/com/content.css" />
    
</head>
<body class="main">
    <div class="wrap">
        <header class="header">
            <div class="header-inner">
                <h1 class="header-logo">
                    <a href="#" aria-label="오릭스 메인으로 이동">
                        <img src="../assets/images/ORIX_logo.png" alt="ORIX 로고" />
                    </a>
                </h1>

                <div class="header-util">
                    <a href="#" class="faq-link">자주 묻는 질문</a>
                    <p class="customer" aria-label="고객센터 02-2050-6700">
                        <span class="customer-label">고객센터</span>
                        <span class="customer-number">02-2050-6700</span>
                    </p>
                </div>
            </div>
        </header>

        <div class="bodyWrap">
            <main class="contentWrap" id="content">
                <div class="main-hero">
                    <div class="main-hero-content">
                        <div class="main-copy-group">
                            <p class="main-copy-en">
                                Trust built into every signature. <strong>ORIX</strong>
                            </p>
                            <p class="main-copy-ko">
                                계약 확인부터 서명까지, 안전하게 오릭스 전자약정
                            </p>
                        </div>

                        <h2 class="main-title">
                            전자약정 <span class="main-title-point">[ 방문없이 ]</span> 완료하다
                        </h2>
                    </div>

                    <div class="main-cta-box">
                        <a href="#" class="main-cta-inner">
                            <div class="main-cta-content">
                                <span class="btn-primary main-btn-primary">전자약정 시작하기</span>
                                <p class="main-cta-text">
                                    계약 주요 내용을 확인한 후 전자약정서 열람 및 서명이 진행됩니다.
                                </p>
                            </div>
                            <span class="main-cta-arrow" aria-hidden="true"></span>
                        </a>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
