<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <title>로그인 - MG캐피탈</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MG캐피탈 로그인 페이지입니다." />

    <!-- 공통 스타일 시트 로드 -->
    <link rel="stylesheet" href="../../assets/css/com/default.css" />
    <link rel="stylesheet" href="../../assets/css/com/common.css" />
    <link rel="stylesheet" href="../../assets/css/com/style.css" />
    <link rel="stylesheet" href="../../assets/css/com/fonts.css" />
    <link rel="stylesheet" href="../../assets/css/com/layout.css" />
    <link rel="stylesheet" href="../../assets/css/com/input.css" />
    <link rel="stylesheet" href="../../assets/css/com/button.css" />
    <link rel="stylesheet" href="../../assets/css/com/content.css" />

    <!-- 라이브러리 및 공통 스크립트 로드 -->
    <script type="text/javascript" src="../../assets/js/lib/jquery-1.12.4.js"></script>
    <script type="text/javascript" src="../../assets/js/lib/jquery-ui.min.js"></script>
    <script type="text/javascript" src="../../assets/js/lib/ui_plugin.js"></script>
    <script type="text/javascript" src="../../assets/js/ui/ui-util.js"></script>
    <script type="text/javascript" src="../../assets/js/ui/com/input.js"></script>
    <script type="text/javascript" src="../../assets/js/ui/com/layout.js"></script>

    <style>
        /* 로그인 페이지 전용 추가 스타일 (필요 시 content.css로 이동 가능) */
        .login-util { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; margin-bottom: 32px; }
        .login-links { display: flex; justify-content: center; gap: 20px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--orix-border); }
        .login-links li { position: relative; }
        .login-links li + li::before { content: ""; position: absolute; left: -10px; top: 50%; transform: translateY(-50%); width: 1px; height: 12px; background: #ccc; }
        .login-links a { font-size: var(--font16); color: var(--orix-text-sub); }
        .btn-primary.w100 { width: 100%; height: 60px; border-radius: 12px; font-size: var(--font20); }
    </style>
</head>
<body>
    <div class="wrap">
        <header class="header">
            <div class="header-inner">
                <h1 class="header-logo">
                    <a href="#" aria-label="메인으로 이동">
                        <img src="../../assets/images/ORIX_logo.png" alt="MG캐피탈 로고" />
                    </a>
                </h1>
                <div class="header-util">
                    <p class="customer">
                        <span class="customer-label">고객센터</span>
                        <span class="customer-number">02-2050-6700</span>
                    </p>
                </div>
            </div>
        </header>

        <div class="bodyWrap">
            <main class="contentWrap" id="content">
                <section class="auth-page">
                    <div class="auth-head">
                        <h2 class="page-title">로그인</h2>
                    </div>
                
                    <div class="auth-body">
                        <div class="auth-grid" style="justify-content: center;">
                            <div class="info-card" style="max-width: 500px; width: 100%;">
                                <div class="field-row form-group">
                                    <label for="userId" class="label-tit">아이디</label>
                                    <div class="field-box">
                                        <span class="ipt-clear">
                                            <input type="text" id="userId" name="userId" placeholder="아이디를 입력해 주세요" />
                                        </span>
                                    </div>
                                </div>
                
                                <div class="field-row form-group">
                                    <label for="userPw" class="label-tit">비밀번호</label>
                                    <div class="field-box">
                                        <span class="ipt-clear">
                                            <input type="password" id="userPw" name="userPw" placeholder="비밀번호를 입력해 주세요" />
                                        </span>
                                    </div>
                                </div>

                                <div class="login-util">
                                    <label class="check-item same-check" for="saveId">
                                        <label class="check">
                                            <input type="checkbox" id="saveId" name="saveId" />
                                            <span>아이디 저장</span>
                                        </label>
                                    </label>
                                </div>

                                <div class="btn-content cta">
                                    <button type="submit" class="btn-primary w100">로그인</button>
                                </div>

                                <ul class="login-links">
                                    <li><a href="#">아이디 찾기</a></li>
                                    <li><a href="#">비밀번호 찾기</a></li>
                                    <li><a href="#">회원가입</a></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>
</body>
</html>
