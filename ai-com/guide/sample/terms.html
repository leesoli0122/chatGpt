<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <title>약관</title>

    <!-- 수정: 회사 정보 제거 -->
    <meta name="description" content="약관 샘플 페이지입니다." />

    <!-- 수정: 경로 일반화 -->
    <link rel="stylesheet" href="/assets/css/com/default.css" />
    <link rel="stylesheet" href="/assets/css/com/common.css" />
    <link rel="stylesheet" href="/assets/css/com/style.css" />
    <link rel="stylesheet" href="/assets/css/com/fonts.css" />
    <link rel="stylesheet" href="/assets/css/com/layout.css" />
    <link rel="stylesheet" href="/assets/css/com/input.css" />
    <link rel="stylesheet" href="/assets/css/com/button.css" />
    <link rel="stylesheet" href="/assets/css/com/tab.css" />
    <link rel="stylesheet" href="/assets/css/com/table.css" />
    <link rel="stylesheet" href="/css/sample.css" />

    <script type="text/javascript" src="/assets/js/lib/jquery-1.12.4.js"></script>
    <script type="text/javascript" src="/assets/js/lib/jquery-ui.min.js"></script>
    <script type="text/javascript" src="/assets/js/lib/ui_plugin.js"></script>
    <script type="text/javascript" src="/assets/js/ui/ui-util.js"></script>
</head>

<body>
    <div class="wrap">
        <main class="contentWrap guide">
            <div class="visual-content">
                <h2>
                    <em>약관동의</em>
                </h2>
            </div>
            <div class="sample-content">
                <div class="form">
                    <div class="form-group">
                        <ul class="check-box terms">
                            <li class="check-all-area">
                                <input type="checkbox" id="chkAll" />
                                <label for="chkAll" class="check-button">
                                    <span>전체 약관에 동의합니다.</span>
                                </label>
                            </li>
                            <li>
                                <input type="checkbox" id="check-required-1" class="chkReq" />
                                <label for="check-required-1" class="check-button" data-popup-open="fullPopup1">
                                    <span>개인정보 수집&#183;이용&#183;취급위탁 동의</span>
                                </label>
                                <button title="개인정보 수집&#183;이용&#183;취급위탁 동의 내용보기" type="button" class="modal" data-popup-open="fullPopup1">내용보기</button>
                            </li>
                            <li>
                                <input type="checkbox" id="check-required-2" class="chkReq" />
                                <label for="check-required-2" class="check-button" data-popup-open="fullPopup2">
                                    <span>본인확인서비스 이용약관</span>
                                </label>
                                <button title="본인확인서비스 이용약관 내용보기" class="modal" type="button" data-popup-open="fullPopup2">내용보기</button>
                            </li>
                            <li>
                                <input type="checkbox" id="check-required-3" class="chkReq" />
                                <label for="check-required-3" class="check-button" data-popup-open="fullPopup3">
                                    <span>고유식별정보처리 동의</span>
                                </label>
                                <button title="고유식별정보처리 동의 내용보기" class="modal" type="button" data-popup-open="fullPopup3">내용보기</button>
                            </li>
                            <li>
                                <input type="checkbox" id="check-required-4" class="chkReq" />
                                <label for="check-required-4" class="check-button" data-popup-open="fullPopup4">
                                    <span>통신사 이용약관 동의</span>
                                </label>
                                <button title="통신사 이용약관 동의 내용보기" class="modal" type="button" data-popup-open="fullPopup4">내용보기</button>
                            </li>
                        </ul>
                    </div>
                </div>
     
            </div>
        </main>
    </div>
    <div id="fullPopup1" class="layerPopup full fullPopupOn">
        <!--[D] fullPopupOn 클래스 :: 헤더 스크립트 적용중-->
        <div class="pop-area">
            <div class="pop-header">
                <h2 class="pop-tit">타이틀</h2>
            </div>
            <div class="pop-body">
                <div class="pop-content">
                    컨텐츠내용
                </div>
            </div>
            <div class="pop-footer">
                <button type="button" class="btn-pop-primary" data-popup-close="fullPopup1">확인했어요</button>
            </div>
            <button type="button" name="button" class="btn btn-close right" data-popup-close="fullPopup1">닫기</button>
        </div>
    </div>
    <div id="fullPopup2" class="layerPopup full fullPopupOn">
        <!--[D] fullPopupOn 클래스 :: 헤더 스크립트 적용중-->
        <div class="pop-area">
            <div class="pop-header">
                <h2 class="pop-tit">타이틀</h2>
            </div>
            <div class="pop-body">
                <div class="pop-content">
                    컨텐츠내용
                </div>
            </div>
            <div class="pop-footer">
                <button type="button" class="btn-pop-primary" data-popup-close="fullPopup2">확인했어요</button>
            </div>
            <button type="button" name="button" class="btn btn-close right" data-popup-close="fullPopup2">닫기</button>
        </div>
    </div>
</body>
</html>
